[build]
  base    = "frontend"
  command = "yarn install --frozen-lockfile && yarn build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"

# SPA fallback so React Router routes work on refresh
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "SAMEORIGIN"
    Referrer-Policy        = "strict-origin-when-cross-origin"
